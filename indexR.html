<!DOCTYPE html>

<html lang="cs">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VaFT Glyph Core</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    background:#050505;

    color:#d8b16a;

    font-family:Arial, sans-serif;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

}

h1{

    margin-bottom:15px;

    font-size:4rem;

    font-weight:300;

}

h2{

    margin-bottom:50px;

    font-weight:300;

    letter-spacing:4px;

    opacity:.7;

}

.grid{

    display:grid;

    grid-template-columns:

        repeat(4,180px);

    gap:30px;

}

.glyph{

    width:180px;

    height:180px;

    border:2px solid rgba(216,177,106,.9);

    border-radius:14px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:64px;

    cursor:pointer;

    transition:0.35s;

    box-shadow:

        0 0 20px rgba(216,177,106,.15),

        inset 0 0 15px rgba(216,177,106,.05);

}

.glyph:hover{

    transform:

        translateY(-6px)

        scale(1.05);

    box-shadow:

        0 0 35px rgba(216,177,106,.45),

        inset 0 0 25px rgba(216,177,106,.15);

}

@media(max-width:900px){

    .grid{

        grid-template-columns:

        repeat(2,180px);

    }

}

</style>

</head>

<body>

<h1>VaFT</h1>

<h2>Vivere atque Fru`ii´T</h2>

<div class="grid">

    <div class="glyph">7i_</div>

    <div class="glyph">°&</div>

    <div class="glyph">`ii´</div>

    <div class="glyph">,_.</div>

    <div class="glyph">¿</div>

    <div class="glyph">j’</div>

    <div class="glyph">i’</div>

    <div class="glyph">,!,</div>

</div>

</body>

</html>
